<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Data Management System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>
    <div class="container">
        <header>
            <h1>Student Data Management</h1>
            <p>Efficiently manage student records with ease.</p>
        </header>

        <section class="form-section">
            <div class="card">
                <h2>Add / Update Student</h2>
                <form id="student-form">
                    <input type="hidden" id="student-id">
                    <div class="form-group">
                        <label for="enrolment_no">Enrolment No</label>
                        <input type="text" id="enrolment_no" placeholder="e.g. 210001" required>
                    </div>
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" placeholder="e.g. John Doe" required>
                    </div>
                    <div class="form-group">
                        <label for="branch">Branch</label>
                        <input type="text" id="branch" placeholder="e.g. Computer Engineering" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="sem">Semester</label>
                            <input type="number" id="sem" placeholder="1-8" min="1" max="8" required>
                        </div>
                        <div class="form-group">
                            <label for="cgpa">CGPA</label>
                            <input type="number" id="cgpa" placeholder="0.00 - 10.00" step="0.01" min="0" max="10"
                                required>
                        </div>
                    </div>
                    <button type="submit" id="submit-btn" class="btn primary">Add Student</button>
                    <button type="button" id="cancel-btn" class="btn secondary" style="display:none;">Cancel</button>
                </form>
            </div>
        </section>

        <section class="table-section">
            <div class="card">
                <h2>Student Records</h2>
                <div class="table-responsive">
                    <table id="student-table">
                        <thead>
                            <tr>
                                <th>Enrolment No</th>
                                <th>Name</th>
                                <th>Branch</th>
                                <th>Sem</th>
                                <th>CGPA</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Data will be populated here by jQuery -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>

</html>
